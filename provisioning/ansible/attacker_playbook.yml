---
- hosts: attacker
  become: yes
  gather_facts: true

  vars:
    ansible_python_interpreter: "/usr/bin/python3"

  pre_tasks:
    - name: "Add 172.18.0.3 attacker line in /etc/hosts"
      lineinfile:
        path: "/etc/hosts"
        line: '172.18.0.3	attacker'
        state: present

    - name: "Remove 127.0.1.1 attacker line in /etc/hosts"
      lineinfile:
        path: "/etc/hosts"
        line: '127.0.1.1	attacker'
        state: absent

    - name: Add Kali Linux archive repository
      copy:
        dest: /etc/apt/sources.list.d/kali-archive.list
        content: "deb [trusted=yes] http://old.kali.org/kali 2024.4 main contrib non-free"

    - name: Update cache
      apt:
        update_cache: yes


  roles:
    - ntp_kali
    - ftp
    - external_mail_handler
    - sqlmap_wordlist
    - rsyslog_ISO8601
    - virtualhost
    - spearphishing
    - generate_malware
    - upgrade_binutils
    - ssh_config
    - dosfstools
    - grc
