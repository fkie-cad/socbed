- name: Install sshpass
  apt:
    name: sshpass=1.10-0.1
    allow_downgrade: yes

- name: Create .ssh directory
  file:
    path: /root/.ssh
    state: directory
    mode: 644
    
- name: Copy ssh config-file (ignore fingerprints)
  copy:
    src: files/config
    dest: /root/.ssh/config
    owner: root
    mode: 644
